<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embutidos La Unión</title>
<style>
:root{--rojo:#8B1A1A;--rojo-dark:#6B1212;--rosa:#FFCCCC;--pink:#f5e0d8;--crema:#F7F2ED;--blanco:#fff;--gris:#595959;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",system-ui,sans-serif;background:#f5f0ee;color:#2a2a2a;min-height:100vh;}
#cover{position:fixed;inset:0;z-index:999;background:var(--pink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:30px;}
#cover img{width:min(180px,55vw);border-radius:50%;box-shadow:0 8px 40px rgba(139,26,26,.3);border:4px solid var(--rojo);padding:8px;background:white;}
#cover h1{font-size:clamp(20px,5vw,28px);color:var(--rojo);font-weight:700;text-align:center;}
#cover p{font-size:14px;color:#666;text-align:center;}
.cover-btns{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.cover-btn{display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px 28px;background:white;border:3px solid var(--rojo);border-radius:14px;cursor:pointer;min-width:130px;transition:all .2s;box-shadow:0 4px 16px rgba(139,26,26,.12);}
.cover-btn:hover{background:var(--rojo);color:white;transform:translateY(-3px);}
.cover-btn:hover .cover-label{color:white;}
.cover-icon{font-size:36px;}
.cover-label{font-size:13px;font-weight:700;color:var(--rojo);letter-spacing:.5px;text-transform:uppercase;}
body.desktop .app{display:flex;height:100vh;overflow:hidden;}
body.desktop .sidebar{width:260px;min-width:260px;background:var(--gris);display:flex;flex-direction:column;overflow:hidden;}
body.desktop .sidebar-header{background:var(--pink);border-bottom:3px solid var(--rojo);display:flex;align-items:center;gap:10px;padding:10px 12px;}
body.desktop .sidebar-logo{height:48px;width:48px;border-radius:50%;border:2px solid var(--rojo);object-fit:contain;background:white;padding:3px;}
body.desktop .sidebar-title{font-size:13px;font-weight:700;color:var(--rojo);line-height:1.2;}
body.desktop .sidebar-title small{font-size:10px;color:#888;font-weight:400;display:block;}
body.desktop .sidebar-search{padding:8px 10px;background:rgba(0,0,0,.2);}
body.desktop .sidebar-search input{width:100%;padding:6px 10px;border:none;border-radius:4px;background:rgba(255,255,255,.13);color:var(--crema);font-size:12px;outline:none;}
body.desktop .sidebar-search input::placeholder{color:rgba(242,242,242,.5);}
body.desktop .sidebar-list{overflow-y:auto;flex:1;padding:6px 0;}
body.desktop .sidebar-list::-webkit-scrollbar{width:3px;}
body.desktop .sidebar-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px;}
body.desktop .cat-header{padding:7px 12px 3px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--rosa);text-transform:uppercase;}
body.desktop .recipe-btn{display:block;width:100%;text-align:left;padding:7px 12px 7px 18px;background:none;border:none;cursor:pointer;color:var(--crema);font-size:12.5px;transition:background .15s;}
body.desktop .recipe-btn:hover{background:rgba(255,255,255,.1);}
body.desktop .recipe-btn.active{background:var(--rojo);font-weight:600;}
body.desktop .sidebar-tool-btn{margin:4px 10px 2px;padding:8px;background:rgba(255,204,204,.15);border:1px dashed rgba(255,204,204,.4);border-radius:5px;color:var(--rosa);font-size:12px;cursor:pointer;text-align:center;transition:background .15s;}
body.desktop .sidebar-tool-btn:hover{background:rgba(255,204,204,.28);}
body.desktop .main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
body.mobile .app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
body.mobile .topbar{background:var(--rojo);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
body.mobile .topbar-logo{height:36px;width:36px;border-radius:50%;object-fit:contain;background:white;padding:3px;}
body.mobile .topbar-title{color:white;font-size:15px;font-weight:700;flex:1;}
body.mobile .topbar-search{display:flex;align-items:center;background:rgba(255,255,255,.15);border-radius:6px;padding:5px 10px;gap:6px;flex:1;}
body.mobile .topbar-search input{background:none;border:none;color:white;font-size:13px;outline:none;width:100%;}
body.mobile .topbar-search input::placeholder{color:rgba(255,255,255,.6);}
body.mobile .topbar-back{background:none;border:none;color:white;font-size:20px;cursor:pointer;padding:4px 8px;}
body.mobile .main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
body.mobile .bottom-nav{background:var(--rojo);display:flex;border-top:2px solid rgba(255,255,255,.15);flex-shrink:0;}
body.mobile .bnav-btn{flex:1;background:none;border:none;color:rgba(255,255,255,.7);padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-size:10px;font-weight:600;transition:color .15s;}
body.mobile .bnav-btn.active{color:white;background:rgba(255,255,255,.12);}
body.mobile .bnav-btn span:first-child{font-size:20px;}
body.mobile .recipe-cards{padding:10px;}
body.mobile .recipe-card{background:white;border-radius:10px;padding:14px 16px;margin-bottom:10px;border:2px solid #eee;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:12px;}
body.mobile .recipe-card:hover{border-color:var(--rosa);}
body.mobile .recipe-card-cat{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--rojo);background:var(--rosa);padding:2px 7px;border-radius:3px;white-space:nowrap;}
body.mobile .recipe-card-name{font-size:15px;font-weight:600;flex:1;}
body.mobile .recipe-card-arrow{color:#ccc;font-size:18px;}
.recipe-view{padding:16px;}
body.desktop .recipe-view{padding:26px 30px;max-width:840px;}
.recipe-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
.recipe-title-block{flex:1;min-width:180px;}
.recipe-cat{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--rojo);background:var(--rosa);padding:2px 8px;border-radius:3px;margin-bottom:6px;}
.recipe-title{font-size:22px;font-weight:700;color:var(--rojo);line-height:1.2;font-family:Georgia,serif;}
body.desktop .recipe-title{font-size:24px;}
.calc-box{background:var(--blanco);border:2px solid var(--rojo);border-radius:8px;padding:12px 16px;min-width:170px;}
.calc-box label{font-size:10px;font-weight:700;color:var(--gris);letter-spacing:.5px;display:block;margin-bottom:4px;text-transform:uppercase;}
.calc-box .ref-name{font-size:11px;color:var(--rojo);margin-bottom:7px;font-style:italic;}
.calc-input-row{display:flex;align-items:center;gap:6px;}
.calc-input{width:100px;padding:7px 10px;border:2px solid var(--rosa);border-radius:4px;font-size:16px;font-weight:700;color:var(--rojo);outline:none;text-align:right;}
.calc-input:focus{border-color:var(--rojo);}
.calc-unit{font-size:14px;color:var(--gris);font-weight:600;}
.calc-total{font-size:11px;color:#888;margin-top:5px;}
.print-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.btn{padding:7px 14px;border:none;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-print{background:var(--rojo);color:white;}
.btn-thermal{background:var(--gris);color:white;}
.btn-shop-add{background:#2E7D32;color:white;}
.section-title{font-size:10.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gris);border-bottom:2px solid var(--rosa);padding-bottom:4px;margin-bottom:10px;}
.ing-table{width:100%;border-collapse:collapse;margin-bottom:22px;}
.ing-table th{text-align:left;font-size:10.5px;font-weight:700;color:var(--crema);background:var(--gris);padding:6px 10px;letter-spacing:.5px;text-transform:uppercase;}
.ing-table th:nth-child(2),.ing-table th:nth-child(3){text-align:right;}
.ing-table td{padding:7px 10px;font-size:13px;border-bottom:1px solid #eedede;vertical-align:middle;}
.ing-table td:nth-child(2),.ing-table td:nth-child(3){text-align:right;font-family:monospace;font-size:12.5px;}
.ing-table tr.ref-row td{background:#fff5f5;font-weight:700;color:var(--rojo);}
.ing-table tr:hover td{background:#fdf5f5;}
.step-badge{display:inline-block;background:var(--rosa);color:var(--rojo);border-radius:3px;font-size:10px;font-weight:700;padding:1px 5px;margin-right:4px;}
.pct-val{color:#aaa;font-size:11px;}
.total-row td{font-weight:700;background:#f7eded;color:var(--rojo);border-top:2px solid var(--rosa);}
.total-row td:nth-child(2){font-size:14px;}
.step-group{margin-bottom:12px;}
.step-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--rojo);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.step-badge-lg{background:var(--rojo);color:white;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.step-items{display:flex;flex-wrap:wrap;gap:4px;}
.step-item{background:var(--blanco);border:1px solid #eedede;border-radius:4px;padding:3px 9px;font-size:12px;color:#333;}
.step-note{background:#fffaf5;border-left:3px solid var(--rojo);border-radius:0 4px 4px 0;padding:7px 11px;font-size:12px;color:#555;line-height:1.6;margin-top:5px;white-space:pre-line;}
body.desktop .welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;}
body.desktop .welcome h2{font-size:26px;color:var(--rojo);margin-bottom:10px;font-family:Georgia,serif;}
body.desktop .welcome p{font-size:14px;color:#999;max-width:340px;line-height:1.6;}
.welcome-logo{width:100px;opacity:.15;margin-bottom:20px;}
.tripas-view{padding:16px;}
body.desktop .tripas-view{padding:26px 30px;max-width:860px;}
.tripas-view h2{font-size:20px;font-weight:700;color:var(--rojo);font-family:Georgia,serif;margin-bottom:4px;}
.tripas-view .subtitle,.shop-view .subtitle,.esp-view .subtitle{font-size:13px;color:#888;margin-bottom:18px;}
.tripa-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.tripa-card{background:white;border:2px solid #eee;border-radius:10px;overflow:hidden;}
.tripa-card-header{color:white;padding:10px 14px;}
.tripa-card-header h3{font-size:13px;font-weight:700;}
.tripa-density{font-size:10px;background:rgba(255,255,255,.2);padding:2px 7px;border-radius:10px;margin-top:4px;display:inline-block;}
.tripa-body{padding:14px;}
.tripa-field{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.tripa-field label{font-size:11px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.5px;}
.tripa-field-input{display:flex;align-items:center;gap:5px;}
.tripa-input{width:80px;padding:6px 8px;border:2px solid var(--rosa);border-radius:4px;font-size:14px;font-weight:700;color:var(--rojo);text-align:right;outline:none;}
.tripa-input:focus{border-color:var(--rojo);}
.tripa-unit{font-size:12px;color:#888;font-weight:600;}
.tripa-result{background:#fff5f5;border-top:2px solid var(--rosa);padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.r-label{font-size:10px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.5px;}
.r-value{font-size:20px;font-weight:700;color:var(--rojo);}
.shop-view{padding:16px;}
body.desktop .shop-view{padding:26px 30px;max-width:860px;}
.shop-view h2,.tripas-view h2,.esp-view h2{font-size:20px;font-weight:700;color:var(--rojo);font-family:Georgia,serif;margin-bottom:4px;}
.shop-recipe-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.shop-recipe-row{display:flex;align-items:center;gap:10px;background:white;border:2px solid #eee;border-radius:7px;padding:10px 12px;transition:border-color .15s;}
.shop-recipe-row.selected{border-color:var(--rojo);background:#fff8f8;}
.shop-recipe-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--rojo);cursor:pointer;flex-shrink:0;}
.shop-rname{flex:1;font-size:13.5px;font-weight:500;cursor:pointer;}
.shop-cat{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--rojo);background:var(--rosa);padding:1px 6px;border-radius:3px;flex-shrink:0;}
.shop-grams-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.shop-grams-wrap input{width:76px;padding:5px 7px;border:2px solid #ddd;border-radius:4px;font-size:13px;font-weight:600;color:var(--rojo);text-align:right;outline:none;}
.shop-recipe-row.selected .shop-grams-wrap input{border-color:var(--rosa);}
.shop-grams-wrap input:focus{border-color:var(--rojo)!important;}
.shop-grams-wrap span{font-size:12px;color:#888;}
.shop-actions{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;align-items:center;}
.shop-select-all{font-size:12px;color:var(--rojo);cursor:pointer;text-decoration:underline;background:none;border:none;padding:0;}
.shop-result{background:white;border-radius:8px;border:2px solid var(--rosa);overflow:hidden;}
.shop-result-header{background:var(--rojo);color:white;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.shop-result-header h3{font-size:14px;font-weight:700;}
.shop-ing-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;font-size:13px;border-bottom:1px solid #f0e8e8;}
.shop-ing-row:last-child{border-bottom:none;}
.shop-ing-row:hover{background:#fdf5f5;}
.s-name{flex:1;}
.s-grams{font-weight:700;font-family:monospace;font-size:13px;color:var(--rojo);}
.shop-check{width:18px;height:18px;accent-color:var(--gris);cursor:pointer;margin-right:10px;flex-shrink:0;}
.shop-ing-row.bought .s-name,.shop-ing-row.bought .s-grams{text-decoration:line-through;opacity:.45;}
.shop-empty{text-align:center;padding:40px 20px;color:#aaa;font-size:13px;}
.esp-view{padding:16px;}
body.desktop .esp-view{padding:26px 30px;max-width:700px;}
.esp-table{width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;}
.esp-table th{background:var(--gris);color:var(--crema);padding:8px 12px;text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.esp-table td{padding:8px 12px;border-bottom:1px solid #f0e8e8;font-size:13px;}
.esp-table tr:hover td{background:#fdf5f5;}
@media print{
  #cover,body.desktop .sidebar,body.mobile .topbar,body.mobile .bottom-nav,.print-row,.calc-box{display:none!important;}
  body.desktop .app{display:block!important;height:auto!important;}
  body.desktop .main{overflow:visible!important;}
}
body.thermal-print #cover,body.thermal-print .sidebar,body.thermal-print .topbar,
body.thermal-print .bottom-nav,body.thermal-print .print-row,body.thermal-print .calc-box,
body.thermal-print .recipe-cards{display:none!important;}
body.thermal-print .app{display:block;height:auto;}
body.thermal-print .main{overflow:visible;}
body.thermal-print .recipe-view{padding:4px;max-width:100%;}
body.thermal-print .recipe-title{font-size:34px;margin-bottom:10px;}
body.thermal-print .ing-table{font-size:28px;}
body.thermal-print .ing-table th{font-size:22px;padding:4px 6px;}
body.thermal-print .ing-table td{padding:4px 6px;font-size:28px;}
body.thermal-print .ing-table td:nth-child(2){font-size:30px;font-weight:700;}
body.thermal-print .step-badge{font-size:20px;}
body.thermal-print .step-note{font-size:24px;padding:8px 10px;}
body.thermal-print .step-item{font-size:26px;}
body.thermal-print .pct-val{display:none;}
body.thermal-print .total-row td{font-size:30px;}
</style>
</head>

const CAT_ORDER=["FRESCOS","MADURADOS","ESCALFADOS"];
let recipes=BASE_RECIPES.slice(),currentRecipeId=null,currentGrams=1000,appMode="desktop";

function setMode(mode){
  appMode=mode;
  document.getElementById("cover").style.display="none";
  document.getElementById("appShell").style.display="";
  document.body.classList.remove("desktop","mobile");
  document.body.classList.add(mode);
  document.getElementById("desktopSidebar").style.display=mode==="desktop"?"":"none";
  document.getElementById("mobileTopbar").style.display=mode==="mobile"?"":"none";
  document.getElementById("mobileBottomNav").style.display=mode==="mobile"?"":"none";
  if(mode==="mobile"){mobileNav("recipes");}
  else{renderSidebar();showView("welcome");}
}
function showCover(){
  document.getElementById("cover").style.display="flex";
  document.getElementById("appShell").style.display="none";
}

function renderSidebar(filter){
  filter=filter||"";
  var listEl=document.getElementById("sidebarListD");
  listEl.innerHTML="";
  var f=filter.toLowerCase();
  var grouped={};
  for(var r of recipes){
    if(f&&!r.name.toLowerCase().includes(f))continue;
    var cat=r.category||"OTROS";
    if(!grouped[cat])grouped[cat]=[];
    grouped[cat].push(r);
  }
  var cats=CAT_ORDER.concat(Object.keys(grouped).filter(c=>CAT_ORDER.indexOf(c)===-1));
  for(var cat of cats){
    if(!grouped[cat]||!grouped[cat].length)continue;
    var ch=document.createElement("div");ch.className="cat-header";ch.textContent=cat;listEl.appendChild(ch);
    for(var rec of grouped[cat]){
      var btn=document.createElement("button");
      btn.className="recipe-btn"+(rec.id===currentRecipeId?" active":"");
      btn.textContent=rec.name;
      (function(rid){btn.onclick=function(){openRecipe(rid);};})(rec.id);
      listEl.appendChild(btn);
    }
  }
}
function filterRecipes(v){
  if(appMode==="desktop")renderSidebar(v);
  else renderMobileList(v);
}

function renderMobileList(filter){
  filter=filter||"";
  var f=filter.toLowerCase();
  var container=document.getElementById("mobileRecipeList");
  container.innerHTML="";
  var sorted=recipes.slice().sort(function(a,b){
    var ai=CAT_ORDER.indexOf(a.category),bi=CAT_ORDER.indexOf(b.category);
    return(ai<0?99:ai)-(bi<0?99:bi)||a.name.localeCompare(b.name);
  });
  for(var r of sorted){
    if(f&&!r.name.toLowerCase().includes(f))continue;
    var card=document.createElement("div");card.className="recipe-card";
    card.innerHTML="<span class='recipe-card-cat'>"+r.category+"</span><span class='recipe-card-name'>"+r.name+"</span><span class='recipe-card-arrow'>&#8250;</span>";
    (function(rid){card.onclick=function(){openRecipe(rid);};})(r.id);
    container.appendChild(card);
  }
}

function mobileNav(tab){
  hideAll();
  document.querySelectorAll(".bnav-btn").forEach(b=>b.classList.remove("active"));
  var el=document.getElementById("bnav-"+tab);if(el)el.classList.add("active");
  document.getElementById("mobileSearchBar").style.display="none";
  document.getElementById("backBtn").style.display="none";
  document.getElementById("mobileTitle").textContent="La Uni\u00f3n";
  if(tab==="recipes"){
    document.getElementById("mobileRecipeList").style.display="block";
    document.getElementById("mobileSearchBar").style.display="flex";
    renderMobileList();
  } else if(tab==="shop"){showView("shop");}
  else if(tab==="tripas"){showView("tripas");}
  else if(tab==="especias"){showView("especias");}
}
function mobileBack(){mobileNav("recipes");}

function hideAll(){
  ["welcomeMsg","recipeView","shopView","tripasView","especialView","mobileRecipeList"].forEach(function(id){
    var el=document.getElementById(id);if(el)el.style.display="none";
  });
}
function showView(v){
  hideAll();
  if(v==="welcome"){document.getElementById("welcomeMsg").style.display="flex";}
  else if(v==="recipe"){document.getElementById("recipeView").style.display="block";}
  else if(v==="shop"){document.getElementById("shopView").style.display="block";renderShop();}
  else if(v==="tripas"){document.getElementById("tripasView").style.display="block";renderTripas();}
  else if(v==="especias"){document.getElementById("especialView").style.display="block";renderEspecias();}
}

function getFatGrams(recipe,proteinG){
  var fat=recipe.ingredients[1];
  if(fat&&!fat.isReference&&fat.percentage!=null&&fat.base==="protein")return proteinG*fat.percentage/100;
  return 0;
}
function calcGrams(ing,proteinG,fatG){
  if(ing.isReference)return proteinG;
  if(ing.percentage==null)return null;
  var base=ing.base==="protein+fat"?proteinG+fatG:proteinG;
  return base*ing.percentage/100;
}
function fmtG(g){
  if(g===null||g===undefined)return "-";
  if(g<1)return g.toFixed(2)+"g";
  if(g>=1000)return(g/1000).toFixed(3).replace(/\.?0+$/,"")+"kg";
  return g.toFixed(1)+"g";
}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");}

function openRecipe(id){
  currentRecipeId=id;
  var recipe=recipes.find(r=>r.id===id);
  if(!recipe)return;
  var refIng=recipe.ingredients.find(i=>i.isReference);
  currentGrams=refIng&&refIng.grams?refIng.grams:1000;
  hideAll();
  document.getElementById("recipeView").style.display="block";
  if(appMode==="mobile"){
    document.getElementById("mobileSearchBar").style.display="none";
    document.getElementById("backBtn").style.display="block";
    document.getElementById("mobileTitle").textContent=recipe.name;
    document.querySelectorAll(".bnav-btn").forEach(b=>b.classList.remove("active"));
  }
  renderRecipe(recipe);
  if(appMode==="desktop")renderSidebar(document.getElementById("searchInputD").value);
}

function renderRecipe(recipe){
  var view=document.getElementById("recipeView");
  var refIng=recipe.ingredients.find(i=>i.isReference);
  var proteinG=currentGrams,fatG=getFatGrams(recipe,proteinG);
  var html="<div class='recipe-view'>";
  html+="<div class='recipe-top'>";
  html+="<div class='recipe-title-block'><span class='recipe-cat'>"+recipe.category+"</span><div class='recipe-title'>"+recipe.name+"</div></div>";
  html+="<div class='calc-box'><label>Prote&#237;na base</label>";
  html+="<div class='ref-name'>"+(refIng?refIng.name:"-")+"</div>";
  html+="<div class='calc-input-row'><input class='calc-input' type='number' id='calcInput' value='"+proteinG+"' min='100' step='100' oninput='updateCalc()'>";
  html+="<span class='calc-unit'>g</span></div>";
  html+="<div class='calc-total' id='calcTotalTxt'></div></div></div>";
  html+="<div class='print-row'>";
  html+="<button class='btn btn-print' onclick='window.print()'>&#128424; Imprimir</button>";
  html+="<button class='btn btn-thermal' onclick='printThermal()'>&#9632; T&#233;rmica</button>";
  html+="<button class='btn btn-shop-add' onclick='addCurrentToShop()'>+ Lista de Compras</button>";
  html+="</div>";
  html+="<div class='section-title'>Ingredientes</div>";
  html+="<table class='ing-table'><thead><tr><th>Ingrediente</th><th>Gramos</th><th>%</th><th>Paso</th></tr></thead><tbody id='ingTbody'>";
  var total=0;
  for(var ing of recipe.ingredients){
    var g=calcGrams(ing,proteinG,fatG);
    if(g!==null)total+=g;
    var pctStr=ing.percentage!=null?"<span class='pct-val'>"+ing.percentage.toFixed(2)+"%</span>":"";
    html+="<tr class='"+(ing.isReference?"ref-row":"")+"'>";
    html+="<td>"+(ing.step?"<span class='step-badge'>"+ing.step+"</span>":"")+ing.name+"</td>";
    html+="<td>"+fmtG(g)+"</td>";
    html+="<td>"+pctStr+"</td>";
    html+="<td>"+(ing.step||"")+"</td></tr>";
  }
  html+="<tr class='total-row'><td>TOTAL FARSA</td><td id='totalFarsaCell'>"+fmtG(total)+"</td><td></td><td></td></tr>";
  html+="</tbody></table>";
  var stepGroups={};
  for(var ing of recipe.ingredients){
    if(ing.step){
      if(!stepGroups[ing.step])stepGroups[ing.step]={items:[],note:""};
      if(!stepGroups[ing.step].note&&ing.notes)stepGroups[ing.step].note=ing.notes;
      stepGroups[ing.step].items.push(ing.name);
    }
  }
  var stepNums=Object.keys(stepGroups).map(Number).sort((a,b)=>a-b);
  if(stepNums.length>0){
    html+="<div class='section-title'>Procedimiento por pasos</div><div>";
    for(var sn of stepNums){
      var sg=stepGroups[sn];
      html+="<div class='step-group'><div class='step-label'><span class='step-badge-lg'>"+sn+"</span>Paso "+sn+"</div>";
      html+="<div class='step-items'>"+sg.items.map(i=>"<span class='step-item'>"+i+"</span>").join("")+"</div>";
      if(sg.note)html+="<div class='step-note'>"+esc(sg.note)+"</div>";
      html+="</div>";
    }
    html+="</div>";
  }
  html+="</div>";
  view.innerHTML=html;
  updateCalcTotal(proteinG,fatG,total);
}

function updateCalc(){
  var inp=document.getElementById("calcInput");
  if(!inp)return;
  var g=parseFloat(inp.value)||0;
  currentGrams=g;
  var recipe=recipes.find(r=>r.id===currentRecipeId);
  if(!recipe)return;
  var fatG=getFatGrams(recipe,g);
  var tbody=document.getElementById("ingTbody");
  if(!tbody)return;
  var rows=Array.from(tbody.querySelectorAll("tr:not(.total-row)"));
  var total=0;
  rows.forEach(function(row,i){
    var ing=recipe.ingredients[i];
    if(!ing)return;
    var grams=calcGrams(ing,g,fatG);
    if(grams!==null)total+=grams;
    if(row.cells[1])row.cells[1].textContent=fmtG(grams);
  });
  var tc=document.getElementById("totalFarsaCell");
  if(tc)tc.textContent=fmtG(total);
  updateCalcTotal(g,fatG,total);
}
function updateCalcTotal(proteinG,fatG,total){
  var el=document.getElementById("calcTotalTxt");
  if(el)el.textContent="Total estimado: "+fmtG(total);
}
function printThermal(){document.body.classList.add("thermal-print");window.print();setTimeout(function(){document.body.classList.remove("thermal-print");},1000);}

function addCurrentToShop(){
  var recipe=recipes.find(r=>r.id===currentRecipeId);
  if(!recipe)return;
  shopSelections[currentRecipeId]={selected:true,grams:currentGrams};
  var name=recipe.name;
  alert(name+" agregado a lista de compras ("+currentGrams+"g de base)");
}

function normalizeIngName(name){
  var n=(name||"").trim().toLowerCase();
  if(/agua/.test(n))return "Agua";
  var map={"sal _fina":"Sal fina","sal_fina":"Sal fina","sal fina":"Sal fina",
    "antioxidante (eritorbato)":"Eritorbato de sodio","antioxidante":"Eritorbato de sodio",
    "eritorbato de sodio":"Eritorbato de sodio","eritorbato":"Eritorbato de sodio",
    "estabilizante (fosfatos)":"Polifosfatos","estabilizante":"Polifosfatos",
    "polifosfato":"Polifosfatos","polifosfatos":"Polifosfatos","fosfatos":"Polifosfatos",
    "pimienta negra molina":"Pimienta negra molida","aji molido":"Aj\u00ed molido"};
  return map[n]||(name.trim().charAt(0).toUpperCase()+name.trim().slice(1));
}

function renderShop(){
  var view=document.getElementById("shopView");
  var html="<div class='shop-view'><h2>&#128722; Lista de Compras</h2><p class='subtitle'>Seleccion&#225; las recetas y la cantidad de prote&#237;na base.</p>";
  html+="<div class='shop-recipe-list' id='shopRecipeList'>";
  var sorted=recipes.slice().sort(function(a,b){
    var ai=CAT_ORDER.indexOf(a.category),bi=CAT_ORDER.indexOf(b.category);
    return(ai<0?99:ai)-(bi<0?99:bi)||a.name.localeCompare(b.name);
  });
  for(var r of sorted){
    var sel=shopSelections[r.id]||{selected:false,grams:r.ingredients[0]&&r.ingredients[0].grams||1000};
    var checked=sel.selected?"checked":"";
    var rowClass="shop-recipe-row"+(sel.selected?" selected":"");
    var rid=r.id;
    html+="<div class='"+rowClass+"' id='shoprow-"+rid+"'>";
    html+="<input type='checkbox' "+checked+" data-rid='"+rid+"' onchange='toggleShopRecipe(this.dataset.rid,this.checked)'>";
    html+="<span class='shop-rname' data-rid='"+rid+"' onclick='toggleShopRecipeByName(this)'>"+r.name+"</span>";
    html+="<span class='shop-cat'>"+r.category+"</span>";
    html+="<div class='shop-grams-wrap'><input type='number' value='"+sel.grams+"' min='100' step='100' data-rid='"+rid+"' onchange='setShopGrams(this.dataset.rid,this.value)'><span>g</span></div>";
    html+="</div>";
  }
  html+="</div>";
  html+="<div class='shop-actions'>";
  html+="<button class='shop-select-all' onclick='selectAllShop(true)'>Seleccionar todo</button>";
  html+="<button class='shop-select-all' onclick='selectAllShop(false)'>Limpiar</button>";
  html+="<button class='btn btn-print' onclick='window.print()'>&#128424; Imprimir lista</button>";
  html+="</div>";
  html+="<div id='shopResult'></div></div>";
  view.innerHTML=html;
  renderShopResult();
}
function toggleShopRecipeByName(el){
  var rid=el.dataset.rid;
  var cb=el.previousElementSibling;
  toggleShopRecipe(rid,!cb.checked);
}
function toggleShopRecipe(id,checked){
  var r=recipes.find(x=>x.id===id);
  if(!shopSelections[id])shopSelections[id]={selected:checked,grams:r&&r.ingredients[0]&&r.ingredients[0].grams||1000};
  else shopSelections[id].selected=checked;
  var row=document.getElementById("shoprow-"+id);
  if(row){
    row.classList.toggle("selected",checked);
    var cb=row.querySelector("input[type=checkbox]");
    if(cb)cb.checked=checked;
  }
  renderShopResult();
}
function setShopGrams(id,val){
  if(!shopSelections[id])shopSelections[id]={selected:false,grams:parseFloat(val)||1000};
  shopSelections[id].grams=parseFloat(val)||1000;
  renderShopResult();
}
function selectAllShop(v){
  for(var r of recipes){
    if(!shopSelections[r.id])shopSelections[r.id]={selected:v,grams:r.ingredients[0]&&r.ingredients[0].grams||1000};
    else shopSelections[r.id].selected=v;
  }
  renderShop();
}
function renderShopResult(){
  var totals={};
  var selected=recipes.filter(r=>shopSelections[r.id]&&shopSelections[r.id].selected);
  if(selected.length===0){
    document.getElementById("shopResult").innerHTML="<div class='shop-empty'>Seleccion&#225; al menos una receta para ver los ingredientes.</div>";
    return;
  }
  for(var recipe of selected){
    var sel=shopSelections[recipe.id];
    var proteinG=sel.grams;
    var fatG=getFatGrams(recipe,proteinG);
    for(var ing of recipe.ingredients){
      var g=calcGrams(ing,proteinG,fatG);
      if(g===null||g<=0)continue;
      var key=normalizeIngName(ing.name).toLowerCase();
      var display=normalizeIngName(ing.name);
      if(!totals[key])totals[key]={name:display,total:0};
      totals[key].total+=g;
    }
  }
  var sorted2=Object.values(totals).sort((a,b)=>a.name.localeCompare(b.name));
  var html="<div class='shop-result'><div class='shop-result-header'><h3>Ingredientes totales</h3><span>"+selected.length+" receta"+(selected.length>1?"s":"")+"</span></div>";
  for(var item of sorted2){
    var bk=item.name.toLowerCase();
    var isBought=boughtItems.has(bk);
    html+="<div class='shop-ing-row"+(isBought?" bought":"")+"'>";
    html+="<input type='checkbox' class='shop-check' "+(isBought?"checked":"")+" data-bk='"+bk+"' onchange='toggleBought(this.dataset.bk,this.checked)'>";
    html+="<span class='s-name'>"+item.name+"</span>";
    html+="<span class='s-grams'>"+fmtG(item.total)+"</span></div>";
  }
  html+="</div>";
  document.getElementById("shopResult").innerHTML=html;
}
function toggleBought(key,val){
  if(val)boughtItems.add(key);else boughtItems.delete(key);
  renderShopResult();
}

function calcTripaMeters(d,f,den){var r=(d/10)/2;var a=Math.PI*r*r;return((f*1000/den)/a/100)*1.08;}
function calcTripa(id,density){
  density=parseFloat(density)||1;
  var d=parseFloat(document.getElementById("td-"+id)&&document.getElementById("td-"+id).value)||0;
  var f=parseFloat(document.getElementById("tf-"+id)&&document.getElementById("tf-"+id).value)||0;
  var c=parseFloat(document.getElementById("tc-"+id)&&document.getElementById("tc-"+id).value)||0;
  if(!d||!f)return;
  var m=calcTripaMeters(d,f,density);
  var me=document.getElementById("tr-m-"+id);
  var ce=document.getElementById("tr-c-"+id);
  if(me)me.textContent=m.toFixed(2)+"m";
  if(ce)ce.textContent=c>0?"$"+(c*m).toFixed(2):"—";
}
function renderTripas(){
  var view=document.getElementById("tripasView");
  var html="<div class='tripas-view'><h2>Calculadora de Tripas</h2><p class='subtitle'>Calcul&#225; los metros de tripa necesarios seg&#250;n di&#225;metro y cantidad de farsa.</p>";
  html+="<div class='tripa-grid'>";
  for(var t of BASE_TRIPAS){
    var tid=t.id,tden=t.density;
    html+="<div class='tripa-card'><div class='tripa-card-header' style='background:"+t.color+"'>";
    html+="<h3>"+t.name+"</h3><span class='tripa-density'>Densidad: "+t.density+"</span></div>";
    html+="<div class='tripa-body'>";
    html+="<div class='tripa-field'><label>Di&#225;metro</label><div class='tripa-field-input'>";
    html+="<input class='tripa-input' id='td-"+tid+"' data-tid='"+tid+"' data-den='"+tden+"' type='number' value='"+t.diameter+"' min='10' max='120' oninput='calcTripa(this.dataset.tid,this.dataset.den)'>";
    html+="<span class='tripa-unit'>mm</span></div></div>";
    html+="<div class='tripa-field'><label>Farsa</label><div class='tripa-field-input'>";
    html+="<input class='tripa-input' id='tf-"+tid+"' data-tid='"+tid+"' data-den='"+tden+"' type='number' value='"+t.farsa+"' min='0.1' step='0.1' oninput='calcTripa(this.dataset.tid,this.dataset.den)'>";
    html+="<span class='tripa-unit'>kg</span></div></div>";
    html+="<div class='tripa-field'><label>Costo/metro</label><div class='tripa-field-input'><span class='tripa-unit'>$</span>";
    html+="<input class='tripa-input' id='tc-"+tid+"' data-tid='"+tid+"' data-den='"+tden+"' type='number' value='"+t.costPerMeter+"' min='0' oninput='calcTripa(this.dataset.tid,this.dataset.den)'>";
    html+="</div></div>";
    html+="</div><div class='tripa-result'>";
    html+="<div><div class='r-label'>Metros</div><div class='r-value' id='tr-m-"+tid+"'>&#8212;</div></div>";
    html+="<div><div class='r-label'>Costo total</div><div class='r-value' id='tr-c-"+tid+"'>&#8212;</div></div>";
    html+="</div></div>";
  }
  html+="</div></div>";
  view.innerHTML=html;
  for(var t of BASE_TRIPAS)calcTripa(t.id,t.density);
}

function renderEspecias(){
  var view=document.getElementById("especialView");
  var html="<div class='esp-view'><h2>Gu&#237;a de Especias</h2><p class='subtitle'>Cantidades de referencia por kilo de carne.</p>";
  html+="<table class='esp-table'><thead><tr><th>Especia</th><th>Gramos por kg de carne</th></tr></thead><tbody>";
  for(var e of ESPECIAS)html+="<tr><td>"+e.especia+"</td><td>"+e.grs_por_kg+"</td></tr>";
  html+="</tbody></table></div>";
  view.innerHTML=html;
}
